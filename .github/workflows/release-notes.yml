name: release notes

on:
  release:
    types: [published, edited]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out validation script
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Validate Homebrew installation instructions
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          ruby scripts/validate-release-instructions-test.rb
          ruby scripts/validate-release-instructions.rb
