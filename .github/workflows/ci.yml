name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Validate Swift package
        working-directory: apps/macos
        run: |
          swift build --jobs 2 --product CloseMyLidCoreTests
          .build/debug/CloseMyLidCoreTests
          swift build --jobs 2 --product CloseMyLid
          .build/debug/CloseMyLid --version
          .build/debug/CloseMyLid status

      - name: Install Raycast dependencies
        working-directory: packages/raycast
        run: npm ci

      - name: Validate Raycast extension
        working-directory: packages/raycast
        run: |
          npm run lint
          npm run build
          npx tsc --noEmit

      - name: Validate Homebrew formula
        run: |
          ruby -c Formula/close-my-lid.rb
          ruby -c Casks/close-my-lid.rb
          brew style Formula/close-my-lid.rb
          brew style Casks/close-my-lid.rb
          ruby scripts/validate-release-instructions-test.rb
          ruby scripts/validate-release-instructions.rb

      - name: Package macOS app
        run: |
          ./scripts/package-macos-app.sh
          plutil -lint "dist/macos/Close My Lid.app/Contents/Info.plist"
          test "$(/usr/libexec/PlistBuddy -c 'Print :SUFeedURL' 'dist/macos/Close My Lid.app/Contents/Info.plist')" = "https://raw.githubusercontent.com/krishkalaria12/close-my-lid/main/appcast.xml"
          test -n "$(/usr/libexec/PlistBuddy -c 'Print :SUPublicEDKey' 'dist/macos/Close My Lid.app/Contents/Info.plist')"
          test -d "dist/macos/Close My Lid.app/Contents/Frameworks/Sparkle.framework"
          otool -L "dist/macos/Close My Lid.app/Contents/MacOS/CloseMyLid" | grep -F '@rpath/Sparkle.framework/'
          codesign --verify --deep --strict --verbose=2 "dist/macos/Close My Lid.app"
          ruby scripts/validate-appcast.rb
